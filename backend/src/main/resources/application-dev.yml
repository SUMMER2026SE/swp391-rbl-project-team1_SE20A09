# ── Dev profile — override application.yml ──
spring:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

logging:
  level:
    com.sportvenue: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

springdoc:
  swagger-ui:
    enabled: true

# Dev: không gửi email thật — in OTP ra log console (tránh lỗi 500 khi SMTP chưa cấu hình)
app:
  mail:
    mock: true
