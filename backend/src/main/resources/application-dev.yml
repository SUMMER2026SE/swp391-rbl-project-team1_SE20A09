# ── Dev profile — override application.yml ──
spring:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:changeme}

  mail:
    host: ${MAIL_HOST:smtp.resend.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:resend}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: true

logging:
  level:
    com.sportvenue: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

springdoc:
  swagger-ui:
    enabled: true

# Dev: MAIL_MOCK=true → chỉ in OTP ra console; false → gửi SMTP (cần MAIL_USERNAME/PASSWORD trong .env)
app:
  mail:
    from: ${MAIL_FROM:noreply@sportvenue.com}
    mock: ${MAIL_MOCK:false}
