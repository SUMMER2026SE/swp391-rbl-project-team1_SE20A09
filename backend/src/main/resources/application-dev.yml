# ── Dev profile — override application.yml ──
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/sportvenue?currentSchema=public&serverTimezone=Asia/Ho_Chi_Minh}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:sportvenue_user}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:changeme}}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    validate-on-migrate: false
    repair-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:changeme}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    com.sportvenue: DEBUG

springdoc:
  swagger-ui:
    enabled: true

app:
  jwt:
    access-token-expiry: 86400
  mail:
    from: ${MAIL_FROM:noreply@sportvenue.com}
    mock: ${MAIL_MOCK:true}
  files:
    upload-dir: ${FILE_UPLOAD_DIR:uploads}
    base-url: ${FILE_BASE_URL:http://localhost:8080}
    max-size-bytes: ${FILE_MAX_SIZE_BYTES:5242880}
