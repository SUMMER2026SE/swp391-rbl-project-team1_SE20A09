spring:
  config:
    import:
      # ../.env trước, backend/.env sau → biến trong backend/.env được ưu tiên
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]
  application:
    name: sport-venue-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── Datasource (PostgreSQL) ────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/sportvenue?currentSchema=public&serverTimezone=Asia/Ho_Chi_Minh}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:sportvenue_user}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:changeme}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # ── JPA ────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway quản lý schema, JPA chỉ validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  # ── Flyway ─────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true

  # ── Redis ──────────────────────────────────────────────
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 2000ms

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  cache:
    type: redis
    redis:
      time-to-live: 3600000       # 1 giờ default TTL
      cache-null-values: false
    # TTL riêng cho adminDashboard (5 phút) được cấu hình trong CacheConfig.java

  # ── Mail ───────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# ── Server ───────────────────────────────────────────────
server:
  port: 8080
  error:
    include-message: never
    include-binding-errors: never

# ── Actuator ─────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# ── App Config (JWT, OTP, Mail, Google) ─────────────────
app:
  jwt:
    secret: ${JWT_SECRET:dev_secret_key_please_change_in_production_min_256_bits}
    access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:86400}
    refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:604800}
  otp:
    expiry-minutes: ${OTP_EXPIRY_MINUTES:5}
  mail:
    from: ${MAIL_FROM:noreply@sportvenue.com}
    # Dev/local: mặc định mock nếu không set — tránh 500 khi chưa cấu hình SMTP
    mock: ${MAIL_MOCK:true}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  files:
    upload-dir: ${FILE_UPLOAD_DIR:uploads}
    base-url: ${FILE_BASE_URL:http://localhost:8080}
    max-size-bytes: ${FILE_MAX_SIZE_BYTES:5242880}
    allowed-extensions:
      - .jpg
      - .jpeg
      - .png
      - .webp
      - .gif
      - .bmp
      - .heic
      - .heif
    allowed-content-types:
      - image/jpeg
      - image/jpg
      - image/png
      - image/webp
      - image/gif
      - image/bmp
      - image/heic
      - image/heif

# ── Goong Map Config ──────────────────────────────────────
goong:
  api:
    key: ${GOONG_API_KEY:}

# ── VNPay sandbox (UC-CUS-02) ─────────────────────────────
vnpay:
  tmn-code: ${VNPAY_TMN_CODE:}
  hash-secret: ${VNPAY_HASH_SECRET:}
  url: ${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
  # Return URL — VNPay redirect browser về đây sau thanh toán.
  return-url: ${VNPAY_RETURN_URL:http://localhost:8080/api/v1/payments/vnpay-return}
  # IPN URL — VNPay gọi server-to-server để xác nhận thanh toán.
  # Dùng ngrok tunnel khi dev local: VNPAY_IPN_URL=https://<ngrok>.ngrok.io/api/v1/payments/vnpay-ipn
  ipn-url: ${VNPAY_IPN_URL:http://localhost:8080/api/v1/payments/vnpay-ipn}
  # FE URL mà BE redirect browser sang sau khi xử lý callback.
  frontend-return-url: ${VNPAY_FRONTEND_RETURN_URL:http://localhost:3000/payments/result}
  version: "2.1.0"
  command: pay
  currency-code: VND
  locale: vn
  order-type: other
  refund:
    # mock-enabled=true: dùng MockVnpayRefundGateway (không gọi HTTP thật) — mặc định cho tới khi
    # có credential VNPay hỗ trợ Refund/QueryDR. Đổi sang false + thêm HttpVnpayRefundGateway khi có.
    mock-enabled: ${VNPAY_REFUND_MOCK_ENABLED:true}
    url: ${VNPAY_REFUND_URL:https://sandbox.vnpayment.vn/merchant_webapi/api/transaction}

# ── Swagger / SpringDoc ───────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs

# ── Logging ───────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.sportvenue: DEBUG
