spring:
  application:
    name: sport-venue-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── JPA ────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway quản lý schema, JPA chỉ validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  # ── Flyway ─────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis ──────────────────────────────────────────────
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 2000ms

  # ── Mail ───────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ── Server ───────────────────────────────────────────────
server:
  port: 8080
  error:
    include-message: never
    include-binding-errors: never

# ── Actuator ─────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# ── JWT ──────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:dev_secret_key_please_change_in_production_min_256_bits}
    access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:900}
    refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:604800}

# ── Swagger / SpringDoc ───────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs

# ── Logging ───────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.sportvenue: DEBUG
