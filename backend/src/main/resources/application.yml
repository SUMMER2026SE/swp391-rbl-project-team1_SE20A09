spring:
  config:
    import:
      # ../.env trước, backend/.env sau → biến trong backend/.env được ưu tiên
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]
  application:
    name: sport-venue-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── Datasource (PostgreSQL) ────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/sportvenue}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:sportvenue_user}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:changeme}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # ── JPA ────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway quản lý schema, JPA chỉ validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  # ── Flyway ─────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis ──────────────────────────────────────────────
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 2000ms

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false

  # ── Mail ───────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# ── Server ───────────────────────────────────────────────
server:
  port: 8080
  error:
    include-message: never
    include-binding-errors: never

# ── Actuator ─────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# ── App Config (JWT, OTP, Mail, Google) ─────────────────
app:
  jwt:
    secret: ${JWT_SECRET:dev_secret_key_please_change_in_production_min_256_bits}
    access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:86400}
    refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:604800}
  otp:
    expiry-minutes: ${OTP_EXPIRY_MINUTES:5}
  mail:
    from: ${MAIL_FROM:noreply@sportvenue.com}
    # Dev/local: mặc định mock nếu không set — tránh 500 khi chưa cấu hình SMTP
    mock: ${MAIL_MOCK:true}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  files:
    upload-dir: ${FILE_UPLOAD_DIR:uploads}
    base-url: ${FILE_BASE_URL:http://localhost:8080}

# ── Swagger / SpringDoc ───────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs

# ── Logging ───────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.sportvenue: DEBUG
