# ── Test profile — dùng cho unit/integration tests ──
# Các giá trị datasource/redis được truyền qua env vars từ CI (ci-backend.yml).
# @TestPropertySource trong SportVenueApplicationTests override trực tiếp
# nên file này chỉ giữ vai trò fallback khi chạy test local.
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sportvenue_test}
    username: ${SPRING_DATASOURCE_USERNAME:sportvenue_user}
    password: ${SPRING_DATASOURCE_PASSWORD:testpassword}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    clean-disabled: false
    clean-on-validation-error: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

logging:
  level:
    root: WARN
    com.sportvenue: INFO
