# ── Full stack: infra + backend + frontend ──
# Dùng khi muốn chạy toàn bộ hệ thống bằng Docker
# Lệnh: docker compose up --build

# FIX: Xóa 'version: 3.9' — obsolete trong Docker Compose v2

networks:
  # PostgreSQL, Redis, MinIO chỉ giao tiếp với backend
  backend-net:
    driver: bridge
  # Frontend chỉ giao tiếp với backend (không access thẳng DB)
  frontend-net:
    driver: bridge

services:
  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sportvenue-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sportvenue}
      POSTGRES_USER: ${POSTGRES_USER:-sportvenue_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - backend-net # FIX: Isolated — frontend không thể access
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sportvenue_user} -d ${POSTGRES_DB:-sportvenue}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m # FIX: Giới hạn RAM
          cpus: '0.5'

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sportvenue-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    environment:
      TZ: Asia/Ho_Chi_Minh
    networks:
      - backend-net # FIX: Isolated
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'

  # ── MinIO ─────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: sportvenue-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme123}
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "${MINIO_PORT_API:-9000}:9000"
      - "${MINIO_PORT_CONSOLE:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - backend-net # FIX: Isolated
    healthcheck:
      # FIX: Thêm healthcheck cho MinIO
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  # ── Backend ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sportvenue-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sportvenue}?currentSchema=public&serverTimezone=Asia/Ho_Chi_Minh
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-sportvenue_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET} # Bắt buộc phải set trong .env — không có default!
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      FILE_UPLOAD_DIR: /app/uploads
      FILE_BASE_URL: ${FILE_BASE_URL:-http://localhost:8080}
      MAIL_MOCK: ${MAIL_MOCK:-true}
      TZ: Asia/Ho_Chi_Minh
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE:-}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET:-}
      VNPAY_URL: ${VNPAY_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL:-http://localhost:8080/api/v1/payments/vnpay-return}
      VNPAY_FRONTEND_RETURN_URL: ${VNPAY_FRONTEND_RETURN_URL:-http://localhost:3000/payments/result}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    volumes:
      - ./backend/uploads:/app/uploads
    ports:
      - "8080:8080"
    networks:
      - backend-net # Kết nối DB/Redis
      - frontend-net # FIX: Cho phép frontend proxy đến backend
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/api/v1/hello || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 1536m
          cpus: '2.0'

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Build-time args — NEXT_PUBLIC_ phải được baked vào bundle lúc build
        NEXT_PUBLIC_APP_NAME: SportVenue
        API_URL: http://backend:8080
    container_name: sportvenue-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # FIX: Dùng API_URL (không có NEXT_PUBLIC prefix) cho server-side proxy
      # Browser luôn gọi relative URL /api/... → Next.js server proxy đến backend
      # Container "backend" resolve được trong frontend-net
      API_URL: http://backend:8080
      # WebSocket cũng server-side
      WS_URL: ws://backend:8080
      # NextAuth
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET} # Bắt buộc phải set
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "3000:3000"
    networks:
      - frontend-net # FIX: Chỉ giao tiếp với backend, không với DB

volumes:
  postgres_data:
  redis_data:
  minio_data:
